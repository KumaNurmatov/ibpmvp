<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TradeAI · Buyer v3</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<!-- placeholders for inline scripts -->
<script type="text/babel">

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island — decorative, must not intercept taps */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
        pointerEvents: 'none',
      }} />
      {/* status bar (absolute) — decorative, must not intercept taps */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10, pointerEvents: 'none' }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>
<script type="text/babel">
// TradeAI v2 — shared design system (dark, accent-tweakable)

const DS = {
  bg:      '#0B0C0E',
  bg2:     '#0E1013',
  s0:      '#101114',
  s1:      '#141618',
  s2:      '#1A1D20',
  s3:      '#23272B',
  border:  'rgba(255,255,255,0.06)',
  border2: 'rgba(255,255,255,0.10)',
  border3: 'rgba(255,255,255,0.14)',
  text:    '#FFFFFF',
  sub:     'rgba(255,255,255,0.60)',
  muted:   'rgba(255,255,255,0.36)',
  faint:   'rgba(255,255,255,0.18)',
  green:   '#22C55E',
  red:     '#F87171',
  warn:    '#FBBF24',
};
window.DS = DS;

// Accent palette
const ACCENTS = {
  lime:    { hex:'#C8FF00', dim:'rgba(200,255,0,0.12)', dim2:'rgba(200,255,0,0.22)', deep:'#3A6400', on:'#0B0C0E', label:'Лайм' },
  mint:    { hex:'#63F0B8', dim:'rgba(99,240,184,0.12)', dim2:'rgba(99,240,184,0.22)', deep:'#1F5D42', on:'#0B0C0E', label:'Мята' },
  amber:   { hex:'#FFB547', dim:'rgba(255,181,71,0.12)', dim2:'rgba(255,181,71,0.22)', deep:'#6B4820', on:'#0B0C0E', label:'Амбер' },
  coral:   { hex:'#FF7A66', dim:'rgba(255,122,102,0.12)', dim2:'rgba(255,122,102,0.22)', deep:'#6B2E24', on:'#FFFFFF', label:'Коралл' },
};
window.ACCENTS = ACCENTS;

// ── Utility: Tag ──────────────────────────────────────────
function Tag({children, tone='neutral', style={}}) {
  const tones = {
    neutral: { bg:'rgba(255,255,255,0.05)', color:DS.sub, bd:'rgba(255,255,255,0.08)' },
    muted:   { bg:'rgba(255,255,255,0.03)', color:DS.muted, bd:'rgba(255,255,255,0.06)' },
    green:   { bg:'rgba(34,197,94,0.10)', color:DS.green, bd:'rgba(34,197,94,0.22)' },
    red:     { bg:'rgba(248,113,113,0.10)', color:DS.red, bd:'rgba(248,113,113,0.22)' },
    warn:    { bg:'rgba(251,191,36,0.10)', color:DS.warn, bd:'rgba(251,191,36,0.22)' },
    accent:  { bg:'var(--accentDim)', color:'var(--accent)', bd:'var(--accentDim2)' },
  };
  const t = tones[tone] || tones.neutral;
  return <span style={{
    fontSize:10.5, fontWeight:700, color:t.color, background:t.bg,
    border:`1px solid ${t.bd}`, borderRadius:5, padding:'2.5px 7px',
    letterSpacing:'0.04em', textTransform:'uppercase', whiteSpace:'nowrap', ...style,
  }}>{children}</span>;
}
window.Tag = Tag;

// Verified badge
function VBadge() {
  return <Tag tone="green">✓ Верифицирован</Tag>;
}
window.VBadge = VBadge;

// ── BackBtn ────────────────────────────────────────────────
function BackBtn({ onPress }) {
  return (
    <div onClick={onPress} style={{
      width:38, height:38, borderRadius:12,
      background:DS.s1, border:`1px solid ${DS.border}`,
      display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', flexShrink:0,
    }}>
      <svg width="9" height="15" viewBox="0 0 9 15" fill="none">
        <path d="M7.5 1.5L2 7.5l5.5 6" stroke={DS.sub} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    </div>
  );
}
window.BackBtn = BackBtn;

// ── Buttons ────────────────────────────────────────────────
function PrimaryBtn({ children, onPress, icon, style={}, small }) {
  return (
    <div onClick={onPress} style={{
      height: small?42:52, borderRadius:14,
      background:'var(--accent)', color:'var(--accentOn)',
      display:'flex', alignItems:'center', justifyContent:'center', gap:8,
      fontSize: small?13:14.5, fontWeight:700, letterSpacing:-0.1,
      padding:'0 20px', cursor:'pointer',
      boxShadow:'0 2px 14px var(--accentDim2)',
      ...style,
    }}>
      {icon && <span style={{display:'flex'}}>{icon}</span>}
      {children}
    </div>
  );
}
window.PrimaryBtn = PrimaryBtn;

function SecondaryBtn({ children, onPress, icon, style={}, small }) {
  return (
    <div onClick={onPress} style={{
      height: small?42:52, borderRadius:14,
      background:DS.s1, border:`1px solid ${DS.border2}`, color:DS.text,
      display:'flex', alignItems:'center', justifyContent:'center', gap:8,
      fontSize: small?13:14.5, fontWeight:600, letterSpacing:-0.1,
      padding:'0 20px', cursor:'pointer',
      ...style,
    }}>
      {icon && <span style={{display:'flex'}}>{icon}</span>}
      {children}
    </div>
  );
}
window.SecondaryBtn = SecondaryBtn;

// ── SearchBar ──────────────────────────────────────────────
function SearchBar({ placeholder='Поиск товаров, поставщиков и фабрик', value, onChange, onFilter, showFilter=true, autoFocus }) {
  return (
    <div style={{
      height:50, borderRadius:14,
      background:DS.s1, border:`1px solid ${DS.border}`,
      display:'flex', alignItems:'center', gap:10, padding:'0 12px 0 16px',
      boxShadow:'inset 0 1px 0 rgba(255,255,255,0.03)',
    }}>
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="7" stroke={DS.sub} strokeWidth="1.8"/>
        <path d="M20 20l-4-4" stroke={DS.sub} strokeWidth="1.8" strokeLinecap="round"/>
      </svg>
      <input value={value||''} onChange={onChange||(()=>{})} readOnly={!onChange} autoFocus={autoFocus} placeholder={placeholder}
        style={{flex:1, background:'none', border:'none', outline:'none',
          color:DS.text, fontSize:14, fontFamily:'inherit',
          caretColor:'var(--accent)'}}/>
      {showFilter && (
        <div onClick={onFilter} style={{
          width:34, height:34, borderRadius:10, background:DS.s3,
          display:'flex', alignItems:'center', justifyContent:'center',
          border:`1px solid ${DS.border}`, cursor:'pointer',
        }}>
          <svg width="15" height="11" viewBox="0 0 16 12" fill="none">
            <path d="M1 1h14M3 6h10M6 11h4" stroke={DS.sub} strokeWidth="1.6" strokeLinecap="round"/>
          </svg>

// ── BottomSheet — animated, dismissable, drag-down to close ──
function BottomSheet({ open, onClose, children, maxHeight }) {
  const [mounted, setMounted] = React.useState(open);
  const [closing, setClosing] = React.useState(false);
  const sheetRef = React.useRef(null);
  const drag = React.useRef({ y0:0, dy:0, dragging:false });
  const [dy, setDy] = React.useState(0);

  React.useEffect(()=>{
    if(open){ setMounted(true); setClosing(false); setDy(0); }
    else if(mounted){
      setClosing(true);
      const t = setTimeout(()=>{ setMounted(false); setClosing(false); }, 280);
      return ()=>clearTimeout(t);
    }
  }, [open]);

  if(!mounted) return null;

  const onPointerDown = (e)=>{
    drag.current = { y0: e.clientY, dy:0, dragging:true };
    e.currentTarget.setPointerCapture?.(e.pointerId);
  };
  const onPointerMove = (e)=>{
    if(!drag.current.dragging) return;
    const dy = Math.max(0, e.clientY - drag.current.y0);
    drag.current.dy = dy;
    setDy(dy);
  };
  const onPointerUp = ()=>{
    if(!drag.current.dragging) return;
    drag.current.dragging = false;
    if(drag.current.dy > 90){
      onClose && onClose();
    } else {
      setDy(0);
    }
  };

  const ease = 'cubic-bezier(0.32, 0.72, 0, 1)';
  const sheetTransform = closing
    ? undefined
    : (dy > 0 ? `translate3d(0, ${dy}px, 0)` : undefined);

  return (
    <div style={{
      position:'absolute', inset:0, zIndex:10,
      display:'flex', alignItems:'flex-end',
    }}>
      {/* Backdrop */}
      <div onClick={onClose} style={{
        position:'absolute', inset:0,
        background:'rgba(0,0,0,0.6)',
        backdropFilter:'blur(4px)', WebkitBackdropFilter:'blur(4px)',
        animation: closing ? `sheet-backdrop-out 240ms ${ease} both` : `sheet-backdrop-in 240ms ${ease} both`,
        opacity: dy > 0 ? Math.max(0.2, 1 - dy/300) : undefined,
      }}/>
      {/* Sheet */}
      <div
        ref={sheetRef}
        onClick={e=>e.stopPropagation()}
        style={{
          position:'relative', width:'100%',
          maxHeight: maxHeight || '85%',
          background:`linear-gradient(180deg, #16191D 0%, #0E1115 100%)`,
          borderRadius:'18px 18px 0 0',
          border:`1px solid ${window.DS.border2}`, borderBottom:'none',
          animation: closing ? `sheet-slide-out 280ms ${ease} both` : `sheet-slide-in 320ms ${ease} both`,
          transform: sheetTransform,
          transition: drag.current.dragging ? 'none' : `transform 220ms ${ease}`,
          boxShadow:'0 -20px 60px rgba(0,0,0,0.5)',
          overflow:'hidden',
          display:'flex', flexDirection:'column',
        }}
      >
        {/* Drag handle area */}
        <div
          onPointerDown={onPointerDown}
          onPointerMove={onPointerMove}
          onPointerUp={onPointerUp}
          onPointerCancel={onPointerUp}
          style={{
            padding:'10px 0 6px', display:'flex', justifyContent:'center',
            cursor:'grab', touchAction:'none', flexShrink:0,
          }}
        >
          <div style={{width:38, height:4, borderRadius:2, background:'rgba(255,255,255,0.18)'}}/>
        </div>
        <div style={{flex:1, overflow:'auto', padding:'4px 20px 24px'}}>
          {children}
        </div>
      </div>
    </div>
  );
}
window.BottomSheet = BottomSheet;

// Drop-in avatar tile. Pass `name` to look up generated PNG, else falls back to monogram-on-gradient.
function Avatar({ name, initials, size=40, radius, style, statusDot, accentBorder }) {
  const r = radius != null ? radius : Math.round(size * 0.27);
  const src = name ? avatarSrc(name) : null;
  const fallbackInitials = initials || (name ? name.split(/\s+/).filter(Boolean).map(w=>w[0]).slice(0,2).join('').toUpperCase() : '?');
  const dotSize = Math.max(10, Math.round(size*0.28));
  return (
    <div style={{width:size, height:size, position:'relative', flexShrink:0, ...style}}>
      <div style={{
        width:'100%', height:'100%', borderRadius:r, position:'relative', overflow:'hidden',

// ── STORY VIEWER (Instagram-style fullscreen) ──────────────
function StoryViewer({ story, stories, onClose, onSwitch, nav }) {
  const slides = story.slides || [];
  const [idx, setIdx] = React.useState(0);
  const [paused, setPaused] = React.useState(false);
  const [progress, setProgress] = React.useState(0);
  const DURATION = 5000;

  React.useEffect(() => { setIdx(0); setProgress(0); }, [story.id]);

  React.useEffect(() => {
    if (paused) return;
    const start = Date.now();
    const tick = setInterval(() => {
      const elapsed = Date.now() - start;
      const p = Math.min(1, elapsed / DURATION);
      setProgress(p);
      if (p >= 1) {
        clearInterval(tick);
        next();
      }
    }, 50);
    return () => clearInterval(tick);
    // eslint-disable-next-line
  }, [idx, paused, story.id]);

  const next = () => {
    if (idx < slides.length - 1) { setIdx(idx + 1); setProgress(0); }
    else {
      // advance to next story
      const i = stories.findIndex(s => s.id === story.id);
      const ns = stories[i + 1];
      if (ns && ns.slides && ns.slides.length) onSwitch(ns); else onClose();
    }
  };
  const prev = () => {
    if (idx > 0) { setIdx(idx - 1); setProgress(0); }
    else {
      const i = stories.findIndex(s => s.id === story.id);
      const ps = stories[i - 1];
      if (ps && ps.slides && ps.slides.length) { onSwitch(ps); }
    }
  };

  const slide = slides[idx];
  if (!slide) return null;
  const photoSrc = PHOTO_MAP[slide.photo] + __PREVIEW_QS;

  return (
    <div style={{
      position:'absolute', inset:0, zIndex:60,
      background:'#000',
      display:'flex', flexDirection:'column',
      animation:'storyOpen 240ms cubic-bezier(0.32, 0.72, 0, 1)',
    }}>
      <style>{`
        @keyframes storyOpen { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
      `}</style>
      {/* Photo background */}
      <img src={photoSrc} alt="" draggable={false} style={{
        position:'absolute', inset:0, width:'100%', height:'100%',
        objectFit:'cover', objectPosition:'50% 40%',
      }}/>
      {/* Top vignette for legibility */}
      <div style={{position:'absolute', inset:0, pointerEvents:'none',
        background:'linear-gradient(180deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0) 22%, rgba(0,0,0,0) 60%, rgba(0,0,0,0.85) 100%)',
      }}/>

      {/* Tap zones */}
      <div onClick={prev} style={{position:'absolute', left:0, top:80, bottom:120, width:'34%', zIndex:2}}/>
      <div onClick={next} style={{position:'absolute', right:0, top:80, bottom:120, width:'66%', zIndex:2}}/>
      <div
        onPointerDown={()=>setPaused(true)}
        onPointerUp={()=>setPaused(false)}
        onPointerCancel={()=>setPaused(false)}
        onPointerLeave={()=>setPaused(false)}
        style={{position:'absolute', inset:0, zIndex:1}}
      />

      {/* Top bar: progress + header */}
      <div style={{position:'relative', zIndex:3, padding:'14px 14px 0'}}>
        {/* Progress bars */}
        <div style={{display:'flex', gap:4, marginBottom:12}}>
          {slides.map((_, i) => (
            <div key={i} style={{flex:1, height:2.5, borderRadius:99, background:'rgba(255,255,255,0.25)', overflow:'hidden'}}>
              <div style={{
                height:'100%',
                width: i < idx ? '100%' : i === idx ? `${progress*100}%` : '0%',
                background:'#fff',
                transition: i === idx ? 'none' : 'width 200ms',
              }}/>
            </div>
          ))}
        </div>
        {/* Header row */}
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <div style={{
            width:34, height:34, borderRadius:'50%', flexShrink:0,
            background: story.self
              ? `linear-gradient(180deg, var(--accent) 0%, var(--accentDeep) 100%)`
              : `linear-gradient(160deg, #2A2D31 0%, #14171A 100%)`,
            display:'flex', alignItems:'center', justifyContent:'center',
            border:'1.5px solid rgba(255,255,255,0.35)',
          }}>
            <StoryGlyph kind={story.glyph} self={story.self} small/>
          </div>
          <div style={{flex:1, minWidth:0}}>
            <div style={{fontSize:13, fontWeight:700, color:'#fff', letterSpacing:-0.1}}>{story.label}</div>

// ── STORY ITEM (compact) ───────────────────────────────────
function StoryItem({ item, onOpen }) {

    <div onClick={onOpen} style={{display:'flex', flexDirection:'column', alignItems:'center', gap:6, width:66, flexShrink:0, cursor:'pointer'}}>

        position:'relative',
      }}>
        <div style={{
          width:'100%', height:'100%', borderRadius:'50%',
          background:DS.bg, padding:1.9,
        }}>
          <div style={{
            width:'100%', height:'100%', borderRadius:'50%',
            background: item.self
              ? `linear-gradient(180deg, var(--accent) 0%, var(--accentDeep) 100%)`

          }}>

                position:'absolute', inset:0, width:'100%', height:'100%',

function StoryGlyph({ kind, self, small }) {
  const c = self ? 'var(--accentOn)' : DS.text;
  const s = small ? 16 : 23;
  if(kind==='fire')   return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M12 2c1 4 3 5 3 8a3 3 0 11-6 0c0-2 2-3 3-8z M8 12c-1 2-2 3-2 5a6 6 0 0012 0c0-3-3-5-4-8" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  if(kind==='price')  return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M3 12l9-9 9 9-9 9-9-9z M9 9l6 6 M9 15l6-6" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  if(kind==='ai')     return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke={c} strokeWidth="1.5"/><path d="M12 2v3M12 19v3M5 5l2 2M17 17l2 2M2 12h3M19 12h3M5 19l2-2M17 7l2-2" stroke={c} strokeWidth="1.5" strokeLinecap="round"/></svg>;
  if(kind==='box')    return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M3 8l9-5 9 5v8l-9 5-9-5V8z M3 8l9 5 9-5 M12 13v9" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  if(kind==='ship')   return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M2 18l2-7h16l2 7M5 11V7h14v4 M9 11V5h6v6 M2 18c2 2 4 2 6 0s4-2 6 0 4 2 6 0" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  if(kind==='factory')return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M3 21V11l5 3V11l5 3V11l5 3v7H3z" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  return null;
}

    case 'market_news':         return <MarketNewsCard item={item} nav={nav}/>;

// ── AI BOTTOM SHEET — 3-state (compact / full / collapsed) ─
function AISheet({ height, state, setState, draft, setDraft, nav }) {
  const isFull = state === 'full';
  const dragRef = React.useRef({ startY:0, dy:0, dragging:false, base: isFull?'full':'compact' });
  const [drag, setDrag] = React.useState(0);

  // Vertical viewport for full-screen calc
  const [vh, setVh] = React.useState(800);
  React.useEffect(()=>{
    const update = ()=>setVh(window.innerHeight || 800);
    update(); window.addEventListener('resize', update);
    return ()=>window.removeEventListener('resize', update);
  },[]);

  // Compute height. While dragging, derive from base + dy.
  const fullH = vh;       // full viewport
  const compactH = height; // ~304px
  let h;
  if (dragRef.current.dragging) {
    const base = dragRef.current.base === 'full' ? fullH : compactH;
    const target = base - drag;
    h = Math.max(compactH - 30, Math.min(fullH, target));
  } else {
    h = isFull ? fullH : compactH;
  }

  const onDown = (e)=>{
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    dragRef.current = { startY:y, dy:0, dragging:true, base: isFull?'full':'compact' };
    setDrag(0);
  };
  const onMove = (e)=>{
    if(!dragRef.current.dragging) return;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const dy = y - dragRef.current.startY;
    dragRef.current.dy = dy;
    setDrag(dy);
  };
  const onUp = ()=>{
    if(!dragRef.current.dragging) return;
    const dy = dragRef.current.dy;
    dragRef.current.dragging = false;
    setDrag(0);
    // From compact: up >40 → full ; down >50 → collapsed
    // From full:    down >120 → compact ; further down >300 → collapsed
    if (dragRef.current.base === 'compact') {
      if (dy < -40) setState('full');
      else if (dy > 60) setState('collapsed');
    } else {
      if (dy > 300) setState('collapsed');
      else if (dy > 120) setState('compact');
    }
  };

  React.useEffect(()=>{
    const up = ()=>onUp();
    const move = (e)=>onMove(e);
    window.addEventListener('mouseup', up);
    window.addEventListener('mousemove', move);
    window.addEventListener('touchend', up);
    window.addEventListener('touchmove', move, {passive:false});
    return ()=>{
      window.removeEventListener('mouseup', up);
      window.removeEventListener('mousemove', move);
      window.removeEventListener('touchend', up);
      window.removeEventListener('touchmove', move);
    };
  },[]);

  return (
    <div style={{
      position:'absolute', left:0, right:0, bottom:0, height:h,
      background: isFull
        ? DS.bg
        : `linear-gradient(180deg, rgba(11,12,14,0.0) 0%, rgba(11,12,14,0.95) 18%, #0B0C0E 35%)`,
      pointerEvents:'auto',
      display:'flex', flexDirection:'column',
      transition: dragRef.current.dragging ? 'none' : 'height .38s cubic-bezier(0.32, 0.72, 0, 1), background .25s',
      zIndex:20,
    }}>
      {/* Subtle separator (compact only) */}
      {!isFull && (
        <div style={{position:'absolute', top:14, left:14, right:14, height:1,
          background: DS.border, pointerEvents:'none',
        }}/>
      )}

      <div style={{
        flex:1, margin: isFull ? 0 : '14px 12px 0',
        borderRadius: isFull ? 0 : '18px 18px 0 0',
        background: isFull
          ? DS.bg
          : `linear-gradient(180deg, #14171B 0%, #0F1216 100%)`,
        border: isFull ? 'none' : `1px solid ${DS.border2}`,
        borderBottom:'none',
        display:'flex', flexDirection:'column', overflow:'hidden',
        paddingTop: isFull ? 58 : 0, // status-bar safe
      }}>
        {/* Drag handle — gesture target */}
        <div
          onMouseDown={onDown}
          onTouchStart={onDown}
          style={{
            display:'flex', justifyContent:'center', paddingTop: isFull ? 4 : 8, paddingBottom:6,
            cursor:'grab', touchAction:'none', userSelect:'none', flexShrink:0,
          }}
        >
          <div style={{width:42, height:4.5, borderRadius:3,
            background: dragRef.current.dragging ? 'var(--accent)' : 'rgba(255,255,255,0.22)',
            transition:'background .2s',
          }}/>
        </div>

        {/* Header */}
        <div style={{padding: isFull ? '4px 18px 14px' : '2px 14px 10px',
          display:'flex', alignItems:'center', gap:10, flexShrink:0,
          borderBottom: isFull ? `1px solid ${DS.border}` : 'none',
        }}>
          <div style={{
            width: isFull?38:32, height: isFull?38:32, borderRadius: isFull?11:9, flexShrink:0,
            background:`linear-gradient(180deg, var(--accent) 0%, var(--accentDeep) 100%)`,
            display:'flex', alignItems:'center', justifyContent:'center',
            boxShadow: isFull ? '0 4px 12px var(--accentDim2)' : 'none',
          }}>
            <svg width={isFull?17:15} height={isFull?17:15} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke="var(--accentOn)" strokeWidth="1.8"/><path d="M12 2v3M12 19v3M5 5l2 2M17 17l2 2M2 12h3M19 12h3M5 19l2-2M17 7l2-2" stroke="var(--accentOn)" strokeWidth="1.8" strokeLinecap="round"/></svg>
          </div>
          <div style={{flex:1, minWidth:0}}>
            <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:1}}>
              <div style={{fontSize: isFull?15:12.5, fontWeight:800, color:DS.text, letterSpacing:-0.2}}>{isFull ? 'AI-ассистент' : 'AI-ассистент по закупкам'}</div>
              <div style={{display:'flex', alignItems:'center', gap:3, padding:'1px 5px', borderRadius:4,

            );
          }

          // plain bubble
          return (
            <div key={i} style={{alignSelf: mine?'flex-end':'flex-start', maxWidth:'85%'}}>
              <div style={{
                background: mine

                  : `linear-gradient(160deg, #181B1F 0%, #101215 100%)`,
                color: mine ? 'var(--accentOn)' : DS.text,

                boxShadow: mine ? '0 4px 12px var(--accentDim2)' : 'none',

      {/* PROMPT CHIPS */}

        <div style={{display:'flex', gap:6, overflowX:'auto', paddingBottom:2, marginRight:-14, paddingRight:14, scrollbarWidth:'none'}}>

              border:`1px solid ${DS.border2}`, borderRadius:9,
              padding:'7px 11px', whiteSpace:'nowrap', cursor:'pointer', flexShrink:0,
            }}>{p}</div>

      </div>

      {/* COMPOSER */}
      <div style={{flexShrink:0, padding:'4px 14px 22px',
        background:'rgba(11,12,14,0.85)', backdropFilter:'blur(12px)', WebkitBackdropFilter:'blur(12px)',
        borderTop:`1px solid ${DS.border}`,
      }}>
        <div style={{
          display:'flex', alignItems:'flex-end', gap:8, marginTop:8,
          background:`linear-gradient(160deg, #16191D 0%, #0D0F12 100%)`,
          border:`1px solid ${DS.border2}`, borderRadius:14,
          padding:'6px 6px 6px 10px',
          boxShadow:'inset 0 1px 0 rgba(255,255,255,0.04)',
        }}>
          <div style={{
            width:32, height:32, borderRadius:9, flexShrink:0,
            background:'rgba(255,255,255,0.04)', border:`1px solid ${DS.border}`,
            display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', marginBottom:2,
          }}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M21.4 11l-9 9a6 6 0 01-8.5-8.5l9-9a4 4 0 015.7 5.7l-9 9a2 2 0 01-2.8-2.8L14.4 7" stroke={DS.sub} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
          <textarea
            value={draft}
            onChange={e=>setDraft(e.target.value)}
            placeholder="Опишите товар, задачу или вопрос"
            rows={1}
            style={{
              flex:1, minHeight:32, maxHeight:90, resize:'none',
              background:'transparent', border:'none', outline:'none',
              color:DS.text, fontSize:13, lineHeight:1.4, fontFamily:'inherit',
              padding:'8px 0', letterSpacing:-0.05,
            }}
          />
          <div style={{
            width:38, height:38, borderRadius:10, flexShrink:0, cursor:'pointer',
            background: draft.trim() ? `linear-gradient(180deg, var(--accent) 0%, var(--accentDeep) 100%)` : 'rgba(255,255,255,0.06)',
            border: draft.trim() ? '1px solid transparent' : `1px solid ${DS.border}`,
            display:'flex', alignItems:'center', justifyContent:'center',
            boxShadow: draft.trim() ? '0 4px 12px var(--accentDim2)' : 'none',
            transition:'all .2s',
          }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke={draft.trim()?'var(--accentOn)':DS.muted} strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
        </div>
      </div>
    </div>
  );
}

function AIBubble({ children }) {
  return (
    <div style={{
      background:`linear-gradient(160deg, #181B1F 0%, #101215 100%)`,
      border:`1px solid ${DS.border}`,
      borderRadius:'14px 14px 14px 4px',
      padding:'11px 12px',
    }}>{children}</div>
  );
}
function AITime() {
  return <div style={{fontSize:9, color:DS.muted, marginTop:4, marginLeft:8, fontFamily:'"SF Mono",ui-monospace,monospace'}}>сейчас</div>;
}

// PHOTO COVERS — multi-layer SVG scenes that read like real industrial photography.
// Each scene uses warm/cool gradients, depth layers, lighting, and a vignette
// to feel like a photograph rather than an abstract placeholder.

function PhotoCover({ scene, h=200, badge, children, dim=0.4 }) {
  return (
    <div style={{height:h, position:'relative', overflow:'hidden', background:'#0A0B0D'}}>
      <PhotoScene scene={scene} h={h}/>
      {/* Subtle film grain */}
      <div style={{position:'absolute', inset:0, opacity:0.06, mixBlendMode:'overlay', pointerEvents:'none',
        backgroundImage:'radial-gradient(rgba(255,255,255,0.4) 0.5px, transparent 0.6px)',
        backgroundSize:'3px 3px',
      }}/>
      {/* Vignette */}
      <div style={{position:'absolute', inset:0, pointerEvents:'none',
        boxShadow:'inset 0 0 80px rgba(0,0,0,0.6)',
      }}/>
      {/* Bottom legibility gradient */}
      <div style={{position:'absolute', inset:0, pointerEvents:'none',
        background:`linear-gradient(180deg, rgba(0,0,0,0) 30%, rgba(0,0,0,${dim+0.4}) 100%)`,
      }}/>
      {badge}
      {children}
    </div>
  );
}

const PHOTO_MAP = {
  coils:         'photos/coils.png',
  factory_floor: 'photos/factory_floor.png',
  warehouse:     'photos/warehouse.png',
  containers:    'photos/containers.png',
  production:    'photos/production.png',
  aluminum:      'photos/aluminum.png',
  market:        'photos/market.png',
  textile:       'photos/textile.png',
};

// Preview server requires the ?t=... token from the page URL on subresource
// requests, otherwise it returns 401. Capture it once at module load.
const __PREVIEW_QS = (typeof location !== 'undefined' && location.search) ? location.search : '';

function PhotoScene({ scene, h }) {
  const src = (PHOTO_MAP[scene] || PHOTO_MAP.factory_floor) + __PREVIEW_QS;
  // object-position tuned per scene to keep subject in upper/center area,
  // since text overlays the bottom 40%.
  const POS = {
    coils:         '50% 35%',
    factory_floor: '50% 40%',
    warehouse:     '50% 30%',
    containers:    '50% 45%',
    production:    '60% 30%',
    aluminum:      '50% 35%',
    market:        '50% 30%',
    textile:       '50% 35%',
  };
  return (
    <img
      src={src}
      alt=""
      draggable={false}
      style={{
        position:'absolute', inset:0,
        width:'100%', height:'100%',
        objectFit:'cover',
        objectPosition: POS[scene] || '50% 35%',
        display:'block',
        filter:'saturate(0.92) contrast(1.04)',
      }}
    />
  );
}

@keyframes nav-push-in {
  from { transform: translate3d(100%, 0, 0); box-shadow: -18px 0 32px rgba(0,0,0,0); }
  to   { transform: translate3d(0,    0, 0); box-shadow: -18px 0 32px rgba(0,0,0,0.45); }
}
@keyframes nav-push-prev {
  from { transform: translate3d(0,      0, 0); filter: brightness(1); }
  to   { transform: translate3d(-25%,   0, 0); filter: brightness(0.55); }
}
@keyframes nav-pop-out {
  from { transform: translate3d(0,    0, 0); box-shadow: -18px 0 32px rgba(0,0,0,0.45); }
  to   { transform: translate3d(100%, 0, 0); box-shadow: -18px 0 32px rgba(0,0,0,0); }
}
@keyframes nav-pop-prev {
  from { transform: translate3d(-25%, 0, 0); filter: brightness(0.55); }
  to   { transform: translate3d(0,    0, 0); filter: brightness(1); }
}
@keyframes nav-tab-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes nav-tab-out {
  from { opacity: 1; }
  to   { opacity: 0; }
}

/* Modal sheet transitions (filter / sort) */
@keyframes sheet-backdrop-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes sheet-backdrop-out {
  from { opacity: 1; }
  to   { opacity: 0; }
}
@keyframes sheet-slide-in {
  from { transform: translate3d(0, 100%, 0); }
  to   { transform: translate3d(0, 0,    0); }
}
@keyframes sheet-slide-out {
  from { transform: translate3d(0, 0,    0); }
  to   { transform: translate3d(0, 100%, 0); }
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(60% 40% at 50% 110%, var(--accentDim), transparent 60%),
    radial-gradient(60% 40% at 50% -10%, rgba(255,255,255,0.02), transparent 60%);
}

/* Tweaks */
.tweaks{
  position:fixed; bottom:20px; right:20px;
  width:250px; background:#16181B;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px; padding:16px;
  display:none; flex-direction:column; gap:12px;
  z-index:9999; color:#fff; font-size:12.5px;
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
  max-height:80vh; overflow-y:auto;
}
.tweaks.on{display:flex}
.tweaks h4{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,0.45);font-weight:700;margin-bottom:-4px}
.tweaks .group{display:flex;gap:6px;flex-wrap:wrap}
.tweaks .opt{
  flex:1 1 auto; min-width:60px;
  padding:8px 10px; border-radius:10px;
  background:#1E2125; border:1px solid rgba(255,255,255,0.06);
  cursor:pointer; font-size:12px; text-align:center;
  display:flex; align-items:center; gap:6px; justify-content:center;
  transition:border-color .15s, background .15s;
}
.tweaks .opt.on{border-color:rgba(255,255,255,0.32);background:#23272B}
.tweaks .sw{width:12px;height:12px;border-radius:4px}

/* Screen nav jumper */
.jumper{
  position:fixed; top:16px; left:50%; transform:translateX(-50%);
  z-index:9998; display:flex; gap:4px; background:rgba(20,22,24,0.85);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08); border-radius:100px; padding:4px;
  font-size:11px; font-weight:600;
}
.jumper .j{
  padding:6px 11px; border-radius:100px; cursor:pointer; color:rgba(255,255,255,0.55);
  transition: background .15s, color .15s;
}
.jumper .j.on{ background:var(--accent); color:var(--accentOn); }
.jumper .j:hover:not(.on){ color:#fff; }
</style>
</head>
<body>
<div class="jumper" id="jumper"></div>
<div id="root"></div>
<div class="tweaks" id="tweaks">
  <h4>Экран</h4>
  <div class="group" id="t-screen"></div>
  <h4>Акцент</h4>
  <div class="group" id="t-accent"></div>
  <h4>Роль</h4>
  <div class="group" id="t-role"></div>
</div>

<script type="text/babel">
function App(){
  const defaults = /*EDITMODE-BEGIN*/{
    "accent": "lime",
    "role": "buyer",
    "screen": "home"
  }/*EDITMODE-END*/;
  const [accentKey, setAccentKey] = React.useState(defaults.accent);
  const [role, setRole] = React.useState(defaults.role);

  // Navigation state — layered for motion
  // layers = array of {key, screen, ctx, kind} where kind = 'push' | 'tab' | 'root'
  const [layers, setLayers] = React.useState([
    { key: 'l0', screen: defaults.screen, ctx: {}, kind: 'root' }
  ]);
  const [trans, setTrans] = React.useState(null);
  // trans = null | { dir: 'push'|'pop'|'tab', kind, fromKey, toKey, started }
  const layerSeq = React.useRef(1);

  const top = layers[layers.length - 1];
  const screen = top.screen;
  const ctx = top.ctx;

  const accent = window.ACCENTS[accentKey] || window.ACCENTS.lime;

  // Apply accent CSS vars
  React.useEffect(()=>{
    const r = document.documentElement;
    r.style.setProperty('--accent', accent.hex);
    r.style.setProperty('--accentOn', accent.on);
    r.style.setProperty('--accentDim', accent.dim);
    r.style.setProperty('--accentDim2', accent.dim2);
    r.style.setProperty('--accentDeep', accent.deep);
  },[accentKey]);

  // Root tabs — these use cross-fade instead of push/pop
  const ROOT_TABS = ['home','catalog','chat','tracking','profile'];

  const nav = React.useCallback((next, nctx={})=>{
    setLayers(prev=>{
      if(next === 'back'){
        if(prev.length <= 1) return prev;
        const popping = prev[prev.length - 1];
        const target  = prev[prev.length - 2];
        // Mark transition: pop animation
        setTrans({ dir:'pop', kind: popping.kind || 'push', fromKey: popping.key, toKey: target.key, started: Date.now() });
        // Schedule actual layer removal after animation
        setTimeout(()=>{
          setLayers(curr => curr.slice(0, -1));
          setTrans(null);
        }, 360);
        return prev; // keep both mounted during animation
      }
      const cur = prev[prev.length - 1];
      const isTab = ROOT_TABS.includes(next) && ROOT_TABS.includes(cur.screen);
      const newKey = 'l' + (layerSeq.current++);
      if(isTab){
        // Tab transition — replace top layer with cross-fade
        const newLayer = { key:newKey, screen:next, ctx:nctx, kind:'tab' };
        setTrans({ dir:'push', kind:'tab', fromKey: cur.key, toKey: newKey, started: Date.now() });
        setTimeout(()=>setTrans(null), 220);
        // Reset stack to single layer (tabs are roots)
        return [newLayer];
      }
      // Push transition
      const newLayer = { key:newKey, screen:next, ctx:nctx, kind:'push' };
      setTrans({ dir:'push', kind:'push', fromKey: cur.key, toKey: newKey, started: Date.now() });
      setTimeout(()=>setTrans(null), 380);
      return [...prev, newLayer];
    });
  }, []);

  // Edit-mode
  React.useEffect(()=>{
    const handler = (e)=>{
      if(e.data?.type==='__activate_edit_mode') document.getElementById('tweaks').classList.add('on');
      if(e.data?.type==='__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('on');
    };
    window.addEventListener('message',handler);
    try{window.parent.postMessage({type:'__edit_mode_available'},'*')}catch(e){}
    return ()=>window.removeEventListener('message',handler);
  },[]);

  // Build tweak buttons
  React.useEffect(()=>{
    const ae = document.getElementById('t-accent');
    ae.innerHTML='';
    Object.entries(window.ACCENTS).forEach(([k,v])=>{
      const b = document.createElement('div');
      b.className = 'opt' + (k===accentKey?' on':'');
      b.innerHTML = `<span class="sw" style="background:${v.hex}"></span>${v.label}`;
      b.onclick = ()=>{
        setAccentKey(k);
        try{window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accent:k}},'*')}catch(e){}
      };
      ae.appendChild(b);
    });
    const re = document.getElementById('t-role');
    re.innerHTML='';
    [['buyer','Покупатель'],['seller','Продавец']].forEach(([k,l])=>{
      const b = document.createElement('div');
      b.className='opt' + (k===role?' on':'');
      b.textContent=l;
      b.onclick=()=>{
        setRole(k);
        try{window.parent.postMessage({type:'__edit_mode_set_keys',edits:{role:k}},'*')}catch(e){}
      };
      re.appendChild(b);
    });
    const se = document.getElementById('t-screen');
    se.innerHTML='';
    const screens = [
      ['home','Главная'],['search','Поиск'],['catalog','Каталог'],
      ['product','Товар'],['supplier','Поставщик'],
    ];
    screens.forEach(([k,l])=>{
      const b = document.createElement('div');
      b.className='opt'+(k===screen?' on':'');
      b.textContent=l;
      b.onclick=()=>{ setLayers([{ key:'l'+(layerSeq.current++), screen:k, ctx:{}, kind:'root' }]); setTrans(null); };
      se.appendChild(b);
    });
  },[accentKey, role, screen]);

  // Jumper
  React.useEffect(()=>{
    const jumper = document.getElementById('jumper');
    jumper.innerHTML='';
    const items = [
      ['home','Главная'],['search','Поиск'],['catalog','Каталог'],
      ['product','Товар'],['supplier','Поставщик'],
    ];
    items.forEach(([k,l])=>{
      const d = document.createElement('div');
      d.className = 'j'+(k===screen?' on':'');
      d.textContent = l;
      d.onclick = ()=>{ setLayers([{ key:'l'+(layerSeq.current++), screen:k, ctx:{}, kind:'root' }]); setTrans(null); };
      jumper.appendChild(d);
    });
  },[screen]);

  const renderScreen = (sc, sctx)=>{
    const sprops = { nav, role, ctx: sctx };
    switch(sc){
      case 'home':     return <window.BuyerHome {...sprops}/>;
      case 'catalog':  return <window.Catalog   {...sprops}/>;
      case 'search':   return <window.Search    {...sprops}/>;
      case 'product':  return <window.Product   {...sprops}/>;
      case 'supplier': return <window.Supplier  {...sprops}/>;
      case 'ai':       return <AI nav={nav} ctx={sctx}/>;
      case 'chat':     return window.Chat ? <window.Chat {...sprops}/> : <Placeholder title="Переписка" nav={nav}/>;
      case 'estimate': return <Placeholder title="Расчёт стоимости" nav={nav}/>;
      case 'deal':     return <Deal nav={nav} ctx={sctx}/>;
      case 'tracking': return <Tracking nav={nav} ctx={sctx}/>;
      case 'profile':  return window.Profile ? <window.Profile {...sprops}/> : <Placeholder title="Профиль" nav={nav}/>;
      default:         return <window.BuyerHome {...sprops}/>;
    }
  };

  return (
    <div style={{position:'relative', zIndex:1}}>
      <IOSDevice width={402} height={874} dark={true}>
        <div style={{position:'absolute', inset:0, overflow:'hidden', background:'#0B0C0E'}}>
          {layers.map((layer, idx)=>{
            const isTop = idx === layers.length - 1;
            const isPrev = idx === layers.length - 2;
            // Motion class
            let layerStyle = { position:'absolute', inset:0, willChange:'transform, opacity' };
            const t = trans;
            if(t){
              const isFromTab = t.kind === 'tab';
              const dur = isFromTab ? '220ms' : '360ms';
              const ease = 'cubic-bezier(0.32, 0.72, 0, 1)';
              if(t.dir === 'push' && layer.key === t.toKey){
                // Incoming: from right (push) or fade (tab)
                layerStyle.animation = isFromTab
                  ? `nav-tab-in ${dur} ${ease} both`
                  : `nav-push-in ${dur} ${ease} both`;
                layerStyle.zIndex = 3;
              } else if(t.dir === 'push' && layer.key === t.fromKey){
                // Outgoing previous: shift left + dim (push) or fade out (tab)
                layerStyle.animation = isFromTab
                  ? `nav-tab-out ${dur} ${ease} both`
                  : `nav-push-prev ${dur} ${ease} both`;
                layerStyle.zIndex = 2;
              } else if(t.dir === 'pop' && layer.key === t.fromKey){
                // Popping out: slide right
                layerStyle.animation = `nav-pop-out 360ms ${ease} both`;
                layerStyle.zIndex = 3;
              } else if(t.dir === 'pop' && layer.key === t.toKey){
                // Restoring previous: from -25% back to 0
                layerStyle.animation = `nav-pop-prev 360ms ${ease} both`;
                layerStyle.zIndex = 2;
              } else {
                layerStyle.opacity = 0; layerStyle.pointerEvents = 'none';
              }
            } else {
              if(!isTop){ layerStyle.opacity = 0; layerStyle.pointerEvents = 'none'; }
            }
            return (
              <div key={layer.key} style={layerStyle}>
                {renderScreen(layer.screen, layer.ctx)}
              </div>
            );
          })}
        </div>
      </IOSDevice>
    </div>
  );
}

function Placeholder({title, nav}){
  return (
    <div style={{height:'100%',background:window.DS.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:18,padding:40,paddingTop:80}}>
      <div style={{
        width:80,height:80,borderRadius:24,
        background:'linear-gradient(135deg, var(--accent) 0%, var(--accentDeep) 100%)',
        display:'flex',alignItems:'center',justifyContent:'center',
        boxShadow:'0 8px 30px var(--accentDim2)'
      }}>
        <div style={{width:40,height:40,borderRadius:12,background:'rgba(255,255,255,0.2)'}}/>
      </div>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:22,fontWeight:800,color:'#fff',letterSpacing:-0.5}}>{title}</div>
        <div style={{fontSize:13,color:'rgba(255,255,255,0.55)',marginTop:8,maxWidth:250,lineHeight:1.5}}>
          Экран в работе — будет готов в следующей итерации.
        </div>
      </div>
      <div onClick={()=>nav('back')} style={{
        padding:'10px 20px', borderRadius:12,
        background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)',
        color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer',
      }}>Назад</div>
    </div>
  );
}

function boot(){
  if(!window.BuyerHome || !window.IOSDevice || !window.Catalog){ setTimeout(boot, 40); return; }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}
boot();
</script>
</body>
</html>
